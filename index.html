<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>大同大学 プログラミング研究会</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="大同大学プログラミング研究会の公式ホームページ。初心者歓迎のプログラミングサークルです。最新のお知らせやイベント情報を掲載しています。" />
  <style>
    :root {
      --accent-color: #2196F3;  /* Bright accent color (blue) */
    }
    /* Reset box model for consistency */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    /* Base styles */
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: #333;
      background: #fff;
      line-height: 1.6;
    }
    a {
      color: var(--accent-color);
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    /* Container to center content and set max width */
    .container {
      width: min(90%, 1000px);
      margin: 0 auto;
      padding: 0 1em;
    }
    /* Header and navigation */
    header {
      background: #fff;
      border-bottom: 1px solid #ccc;
      position: sticky; top: 0;
      z-index: 1000;
    }
    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5em 0;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
      white-space: nowrap;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 1.5em;
    }
    nav li {
      margin: 0;
      padding: 0;
    }
    nav a {
      color: #333;
      font-weight: bold;
    }
    nav a:hover {
      color: var(--accent-color);
    }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    /* Hero section */
    #hero {
      padding: 4em 1em;
      text-align: center;
    }
    #hero h2 {
      font-size: 2.5rem;
      margin: 0 0 0.5em;
    }
    #hero .tagline {
      font-size: 1.2rem;
      margin: 0;
    }
    /* Highlight style for “初心者大歓迎” */
    .highlight {
      background: var(--accent-color);
      color: #fff;
      padding: 0 0.2em;
      border-radius: 4px;
    }
    /* Section headings (excluding hero) */
    section:not(#hero) h2 {
      font-size: 1.8rem;
      margin: 0 0 0.5em;
      display: inline-block;
      padding-bottom: 0.2em;
      border-bottom: 3px solid var(--accent-color);
    }
    /* About & News section content spacing */
    section {
      padding: 3em 0;
    }
    /* News list styles */
    .news-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .news-list li {
      margin: 0.5em 0;
    }
    /* Event calendar responsive iframe container */
    .responsive-iframe-container {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 75%;  /* 4:3 aspect ratio for calendar */
      overflow: hidden;
    }
    .responsive-iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    /* Footer style */
    footer {
      background: #f0f0f0;
      text-align: center;
      padding: 2em 1em;
      font-size: 0.9rem;
      color: #555;
    }
    /* Responsive adjustments */
    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        right: 0;
        background: #fff;
        padding: 0.5em 1em;
        border: 1px solid #ccc;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      }
      nav ul li {
        margin: 0.5em 0;
      }
      .nav-toggle {
        display: block;
      }
      nav.open ul {
        display: flex;
      }
    }
    /* Responsive Calendar: show/hide month vs agenda */
    @media (max-width: 549px) {
      .big-container { display: none; }
    }
    @media (min-width: 550px) {
      .small-container { display: none; }
    }
  </style>
</head>
<body>

  <!-- Header with site title and navigation -->
  <header>
    <div class="container">
      <h1>大同大学プログラミング研究会</h1>
      <nav>
        <ul>
          <li><a href="#about">サークル紹介</a></li>
          <li><a href="#events">イベントカレンダー</a></li>
        </ul>
      </nav>
      <!-- Hamburger menu button (visible on mobile) -->
      <button class="nav-toggle" aria-label="メニュー">☰</button>
    </div>
  </header>

  <!-- Hero section with welcome message -->
  <section id="hero">
    <div class="container">
      <h2><span class="highlight">初心者大歓迎！</span></h2>
      <p class="tagline">プログラミングを一緒に楽しもう！ 大同大学プログラミング研究会へようこそ。</p>
    </div>
  </section>

  <!-- About the circle (club introduction) section -->
  <section id="about">
    <div class="container">
      <h2>サークル紹介</h2>
      <p>プログラミング研究会では、メンバーが自由にプロジェクトを企画し、それぞれ好きな活動に取り組んでいます。ゲーム制作やウェブサイト制作など、その活動内容は多岐にわたります。</p>
      <p>興味があれば、経験者・初心者を問わずお気軽にご参加ください。</p>
    </div>
  </section>

  

  <!-- Event Calendar section with embedded Google Calendar -->
  <section id="events">
    <div class="container">
      <h2>イベントカレンダー</h2>
      <!-- Google Calendar embed: Month view (desktop) -->
      <div class="responsive-iframe-container big-container">
        <iframe src="https://calendar.google.com/calendar/embed?height=600&amp;wkst=1&amp;bgcolor=%23ffffff&amp;src=japanese__ja%40holiday.calendar.google.com&amp;color=%232952A3&amp;ctz=Asia%2FTokyo" frameborder="0" scrolling="no"></iframe>
      </div>
      <!-- Google Calendar embed: Agenda view (mobile) -->
      <div class="responsive-iframe-container small-container">
        <iframe src="https://calendar.google.com/calendar/embed?mode=AGENDA&amp;height=600&amp;wkst=1&amp;bgcolor=%23ffffff&amp;src=japanese__ja%40holiday.calendar.google.com&amp;color=%232952A3&amp;ctz=Asia%2FTokyo" frameborder="0" scrolling="no"></iframe>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>© 2025 大同大学プログラミング研究会</p>
    </div>
  </footer>

  <!-- Mobile menu toggle script -->
  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('nav').classList.toggle('open');
    });
  </script>

</body>
</html>
